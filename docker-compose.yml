version: '3.9'

services:

  # ML Prediction Service
  ml-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: credit_card_ml_service
    restart: unless-stopped
    environment:
      - MODEL_V1_PATH=models/model_v1.pkl
      - MODEL_V2_PATH=models/model_v2.pkl
    volumes:
      - ./logs:/app/logs          # persist JSON logs on the host
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3

  # Nginx Reverse Proxy 
  nginx:
    image: nginx:1.27-alpine
    container_name: credit_card_nginx
    restart: unless-stopped
    ports:
      - "80:80"                   # public entry point
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      ml-service:
        condition: service_healthy

# Named volumes
  logs:
